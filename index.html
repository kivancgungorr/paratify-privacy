<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paratify - Paranın Yeni Nesil Hali</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00C853 0%, #00E676 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            padding: 60px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #00C853;
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .tagline {
            color: #666;
            font-size: 20px;
            margin-bottom: 40px;
        }
        
        .description {
            color: #333;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .link {
            background: #00C853;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .link:hover {
            background: #00E676;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,200,83,0.3);
        }
        
        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💰</div>
        <h1>Paratify</h1>
        <p class="tagline">Paranın Yeni Nesil Hali</p>
        
        <p class="description">
            Paratify ile finansal özgürlüğe ulaşın! Gelir, gider, bütçe ve yatırımlarınızı tek bir uygulamada yönetin.
        </p>
        
        <div class="links">
            <a href="privacy.html" class="link">Gizlilik Politikası</a>
            <a href="terms.html" class="link">Kullanım Koşulları</a>
        </div>
        
        <div class="footer">
            <p><strong>© 2026 Paratify</strong></p>
            <p>Tüm hakları saklıdır</p>
            <p style="margin-top: 10px;">
                <a href="mailto:kivancgungor95@gmail.com" style="color: #00C853; text-decoration: none;">kivancgungor95@gmail.com</a>
            </p>
        </div>
    </div>
</body>
</html>
